{% extends 'base.html' %}
{% block title %}Hesabat Yaz{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h5 class="fw-bold mb-1"><i class="bi bi-pencil-square text-primary me-2"></i>Hesabat yaz</h5>
            <p class="text-muted small mb-3">Xəstə: {{ patient.get_full_name }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Başlıq</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Məzmun</label>
                    {{ form.content }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Resept</label>
                    {{ form.prescription }}
                </div>
                <button type="submit" class="btn btn-success w-100">
                    <i class="bi bi-check-circle me-2"></i>Yadda saxla
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
