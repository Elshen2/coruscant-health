{% extends 'base.html' %}
{% block title %}Sifariş Ver{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h5 class="fw-bold mb-1"><i class="bi bi-clipboard2-plus text-primary me-2"></i>Xidmət sifarişi</h5>
            <p class="text-muted small mb-3">Xəstə: {{ patient.get_full_name }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Xidmət növü</label>
                    {{ form.service_type }}
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Qeyd</label>
                    {{ form.notes }}
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-semibold">
                    <i class="bi bi-send me-2"></i>Sifariş göndər
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
