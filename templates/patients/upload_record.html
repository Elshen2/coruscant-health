{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card p-4 shadow-sm border-0">
        <h4 class="mb-4 text-primary"><i class="bi bi-plus-circle"></i> Sağlamlıq məlumatı yüklə</h4>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ürək ritmi (bpm)</label>
                    <input type="number" name="heart_rate" class="form-control" placeholder="Məs: 72">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Temperatur (°C)</label>
                    <input type="number" step="0.1" name="temperature" class="form-control" placeholder="Məs: 36.6">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sistolik təzyiq</label>
                    <input type="number" name="blood_pressure_sys" class="form-control" placeholder="Məs: 120">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Diastolik təzyiq</label>
                    <input type="number" name="blood_pressure_dia" class="form-control" placeholder="Məs: 80">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Oksigen səviyyəsi (%)</label>
                <input type="number" name="oxygen_level" class="form-control" placeholder="Məs: 98">
            </div>

            <div class="mb-3">
                <label class="form-label">Qeyd</label>
                <textarea name="notes" class="form-control" rows="3" placeholder="Əlavə qeydləriniz..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-upload"></i> Yüklə</button>
        </form>
    </div>
</div>
{% endblock %}
