<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CHA{% endblock %} | Coruscant Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            <i class="bi bi-heart-pulse-fill me-2"></i>Coruscant Health
        </a>
        <div class="navbar-nav ms-auto align-items-center">
            <span class="text-white me-3">
                <i class="bi bi-person-circle me-1"></i>
                {{ user.get_full_name|default:user.username }}
                <span class="badge bg-light text-primary ms-1">{{ user.role }}</span>
            </span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Çıxış
            </a>
        </div>
    </div>
</nav>
{% endif %}

<div class="container mt-4">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
