{% extends 'base.html' %}
{% block title %}Gözləmə{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card p-5">
            <i class="bi bi-hourglass-split text-warning" style="font-size:3rem"></i>
            <h5 class="fw-bold mt-3">Təsdiq gözlənilir</h5>
            <p class="text-muted">
                Qeydiyyatınız qəbul edildi. Administrator hesabınızı
                təsdiq etdikdən sonra daxil ola bilərsiniz.
            </p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary mt-2">
                <i class="bi bi-arrow-left me-2"></i>Girişə qayıt
            </a>
        </div>
    </div>
</div>
{% endblock %}
