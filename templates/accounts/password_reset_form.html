{% extends 'base.html' %}
{% block title %}Şifrəni Yenilə{% endblock %}

{% block content %}
<div class="auth-wrapper" style="margin:-1.5rem;padding:2rem;">
    <div class="auth-card bg-white shadow-lg" style="max-width: 400px; margin: auto; padding: 2rem; border-radius: 10px;">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-danger" style="font-size:2.5rem"></i>
            <h4 class="fw-bold mt-2">Şifrəni Yenilə</h4>
            <p class="text-muted small">İstifadəçi adınızı və yeni şifrənizi daxil edin</p>
        </div>

        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endfor %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">İstifadəçi adı (Məsələn: pt_wGeY5)</label>
                <input type="text" name="username" class="form-control" required placeholder="İstifadəçi adınızı yazın">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Yeni Şifrə</label>
                <input type="password" name="new_password" class="form-control" required placeholder="Yeni şifrənizi təyin edin">
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
                Şifrəni Təsdiqlə və Dəyiş
            </button>
        </form>

        <hr>
        <p class="text-center text-muted small mb-0">
            Şifrəni xatırladınız?
            <a href="{% url 'login' %}" class="text-primary fw-semibold">Giriş səhifəsinə qayıt</a>
        </p>
    </div>
</div>
{% endblock %}
